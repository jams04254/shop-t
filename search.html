<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One Searchable Image Dropdown</title>
    <style>
           * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 20px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .cart-icon {
            position: relative;
            font-size: 24px;
            cursor: pointer;
        }

        #cart-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4757;
            color: white;
            font-size: 12px;
            padding: 3px 7px;
            border-radius: 50%;
            font-weight: bold;
        }

        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .product-price {
            color: #2ed573;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn-add {
            background: #1e90ff;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background: #3742fa;
        }

        /* Cart Sidebar */
        .cart-sidebar {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: fit-content;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item-details h4 {
            font-size: 14px;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        .btn-qty {
            background: #e4e7eb;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-item-price {
            font-weight: bold;
            font-size: 14px;
        }

        .cart-total {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            border-top: 2px solid #333;
            padding-top: 15px;
        }

        .btn-checkout {
            display: block;
            width: 100%;
            background: #2ed573;
            color: white;
            text-align: center;
            padding: 12px;
            border: none;
            border-radius: 5px;
                       font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }

        .btn-checkout:hover {
            background: #26af5f;
        }

        .empty-message {
            color: #888;
            text-align: center;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <header>
        <h2>Shopping-t</h2>
        <button onclick="toggleSettings()">
            <div class="cart-icon">
                🛒 <span id="cart-count">0</span>
            </div>
        </button>
    </header>
<!-- The Settings Box (Hidden by default) -->
<div id="settingsBox" style="display: none; border: 1px solid black; padding: 10px; margin-top: 10px;">
     <button onclick="history.back()">⬅️</button>
  <h3>Cart</h3>
        <div  class="cart-sidebar">
            <h3>Your Cart</h3>
            <div id="cart-items-container">
                </div>
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-price">$0.00</span>
            </div>
             <center><form action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="0333555b-f17b-4fa0-ae5b-0675529af72d">
        <input type="address" id="address" name="address" placeholder="Address" required><br><br>
        <input type="text" id="username-input" name="name" placeholder="Name" required><br><br>
        <input type="text" id="id-input" name="id" placeholder="Put your own id name" required><br><br>
        <input type="text" id="goods-id-input" name="Goods id" placeholder="Goods ID" required><br><br>
            <button type="submit" class="btn-checkout" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>
<script>
  function toggleSettings() {
    let box = document.getElementById("settingsBox");
    
    // If hidden, show it. If showing, hide it.
    if (box.style.display === "none") {
      box.style.display = "block";
    } else {
      box.style.display = "none";
    }
  }
</script><br><br>
    <div class="container">
        <div class="products-grid">
            <div class="product-card" data-id="1" data-name="Wireless Headphones" data-price="10">
                <h3>Wireless Headphones</h3>
                <h2>ID: 1</h2>
                <img src="https://m.media-amazon.com/images/I/61RahTQtAqL._AC_UF894,1000_QL80_.jpg">
                <p class="product-price">$10.00</p>
                <button class="btn-add">Add to Cart</button>
            </div>
            <div class="product-card" data-id="2" data-name="Smart Watch" data-price="149">
                <h3>Smart Watch</h3>
                 <h2>ID: 2</h2>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQo0pApl5ofZ3KmEIxwP0VYTd1it_65iuXjiQ&s">
                <p class="product-price">$149.00</p>
                <button class="btn-add">Add to Cart</button>
            </div>
            <div class="product-card" data-id="3" data-name="Mechanical Keyboard" data-price="30">
                <h3>Mechanical Keyboard</h3>
                 <h2>ID: 3</h2>
                 <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSz-poJ4pNFtoCOzLq0uYkv_22obsic8Tm8fA&s">
                <p class="product-price">$30.00</p>
                <button class="btn-add">Add to Cart</button>
            </div>
        </div><br><br><br>
    <script>
        // Load cart from local storage or start fresh
        let cart = JSON.parse(localStorage.getItem('app_cart')) || [];

        // Elements
        const cartCountEl = document.getElementById('cart-count');
        const cartItemsContainer = document.getElementById('cart-items-container');
        const cartTotalPriceEl = document.getElementById('cart-total-price');

        // Initialize App UI
        document.querySelectorAll('.btn-add').forEach(button => {
            button.addEventListener('click', (e) => {
                const card = e.target.closest('.product-card');
                const id = card.dataset.id;
                const name = card.dataset.name;
                const price = parseFloat(card.dataset.price);
                
                addToCart(id, name, price);
            });
        });

        function addToCart(id, name, price) {
            // Check if item already exists in cart
            const existingItem = cart.find(item => item.id === id);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ id, name, price, quantity: 1 });
            }

            saveAndRender();
        }

        function changeQuantity(id, change) {
            const item = cart.find(item => item.id === id);
            if (!item) return;

            item.quantity += change;

            // If quantity drops to 0, remove it entirely
            if (item.quantity <= 0) {
                cart = cart.filter(item => item.id !== id);
            }

            saveAndRender();
        }

        function saveAndRender() {
            // Save state to browser storage
            localStorage.setItem('app_cart', JSON.stringify(cart));
            renderCart();
        }

        function renderCart() {
            // 1. Update Cart Badge Count
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCountEl.textContent = totalItems;

            // 2. Render List Items
            cartItemsContainer.innerHTML = '';
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="empty">Your cart is empty.</p>';
                cartTotalPriceEl.textContent = '$0.00';
                return;
            }

            let totalCost = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                totalCost += itemTotal;

                const itemRow = document.createElement('div');
                itemRow.className = 'cart-item';
                itemRow.innerHTML = `
                    <div class="cart-item-details">
                        <h4>${item.name}</h4>
                        <div class="quantity-controls">
                            <button class="btn-qty" onclick="changeQuantity('${item.id}', -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="btn-qty" onclick="changeQuantity('${item.id}', 1)">+</button>
                        </div>
                    </div>
                    <div class="cart-item-price">$${itemTotal.toFixed(2)}</div>
                `;
                cartItemsContainer.appendChild(itemRow);
            });

            // 3. Update Total Price Display
            cartTotalPriceEl.textContent = `$${totalCost.toFixed(2)}`;
        }

        function checkout() {
            if(cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }
            alert("Proceeding to payment gateway with data: " + JSON.stringify(cart));
            // Here you would typically route to Stripe, PayPal, or your own server API.
        }

        // Initial setup run on page load
        renderCart();
    </script>
</body>
</html>
