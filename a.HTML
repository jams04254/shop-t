<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Local Wi-Fi Chat</title>
<style>
  body { font-family: sans-serif; background: #111; color: #eee; padding: 20px; max-width: 480px; margin: auto; }
  textarea, input { width: 100%; margin: 6px 0; padding: 8px; background: #1a1a1a; color: #eee; border: 1px solid #333; }
  button { padding: 10px; width: 100%; margin: 6px 0; background: #5b8cff; color: white; border: none; border-radius: 6px; }
  #chat-window { height: 250px; overflow-y: auto; background: #000; padding: 10px; margin: 10px 0; }
  .me { color: #5b8cff; } .them { color: #4caf82; }
</style>
</head>
<body>
<h2>Local Wi-Fi Chat</h2>

<div id="setup">
  <button onclick="startChat()">Start Chat (Person A)</button>
  <button onclick="joinChat()">Join Chat (Person B)</button>

  <div id="a-flow" style="display:none;">
    <p>1. Generate code, send to friend:</p>
    <button onclick="genOffer()">Generate Code</button>
    <textarea id="offer-out" readonly></textarea>
    <p>2. Paste friend's reply code:</p>
    <textarea id="answer-in" placeholder="Paste here"></textarea>
    <button onclick="connectAnswer()">Connect</button>
  </div>

  <div id="b-flow" style="display:none;">
    <p>1. Paste friend's code:</p>
    <textarea id="offer-in" placeholder="Paste here"></textarea>
    <button onclick="genAnswer()">Generate Reply Code</button>
    <p>2. Send this back to friend:</p>
    <textarea id="answer-out" readonly></textarea>
  </div>
  <p id="status">Not connected</p>
</div>

<div id="chat" style="display:none;">
  <div id="chat-window"></div>
  <input id="msg-input" placeholder="Type a message...">
  <button onclick="sendMsg()">Send</button>
</div>

<script>
let pc = new RTCPeerConnection();
let channel;

function startChat() {
  document.getElementById('a-flow').style.display = 'block';
  document.getElementById('b-flow').style.display = 'none';
}
function joinChat() {
  document.getElementById('b-flow').style.display = 'block';
  document.getElementById('a-flow').style.display = 'none';
}
