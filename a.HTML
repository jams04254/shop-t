<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100% Working Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #e5ddd5; }
        .chat-container { width: 100%; max-width: 400px; height: 90vh; background: white; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .box { padding: 20px; display: flex; flex-direction: column; gap: 10px; flex: 1; justify-content: center; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; }
        button { padding: 12px; background: #128c7e; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #chatArea { display: none; flex-direction: column; height: 100%; padding: 0; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; background: #efeae2; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 10px; font-size: 0.95rem; word-break: break-word; }
        .me { background: #d9fdd3; align-self: flex-end; }
        .them { background: white; align-self: flex-start; }
        .input-box { display: flex; padding: 10px; background: #f0f2f5; gap: 5px; }
        .input-box input { flex: 1; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">📱 Live Web Chat</div>
    
    <!-- Login screen -->
    <div id="loginArea" class="box">
        <label>Pick a room name (Use the same word as your friend):</label>
        <input type="text" id="roomInput" placeholder="example: secret123" autocomplete="off">
        <button onclick="joinRoom()">Connect</button>
    </div>

    <!-- Chat screen -->
    <div id="chatArea" class="box">
        <div id="msgDisplay" class="messages"></div>
        <div class="input-box">
            <input type="text" id="textInput" placeholder="Type a message...">
            <button onclick="sendMsg()">Send</button>
        </div>
    </div>
</div>

<script>
    // This uses a public test server that requires NO keys
    let room = "", talk = null;
    let history = JSON.parse(localStorage.getItem('phoneChatSave')) || [];

    function joinRoom() {
        room = document.getElementById('roomInput').value.trim().toLowerCase();
        if(!room) return alert("Type a room name!");

        document.getElementById('loginArea').style.display = "none";
        document.getElementById('chatArea').style.display = "flex";

        // Load history saved on phone storage
        history.forEach(m => showText(m.style, m.txt));

        // Connect to a free test broadcasting network
        talk = new EventSource("https://ntfy.sh" + room + "/sse");
        
        // Listen for data coming from the other phone
        talk.onmessage = function(event) {
            const data = JSON.parse(event.data);
            // Ignore messages sent by yourself
            if (data.id !== myId) {
                saveText('them', data.msg);
            }
        };
    }

    // Generate a unique badge for your phone session
    const myId = Math.random().toString(36).substring(2, 9);

    function sendMsg() {
        const input = document.getElementById('textInput');
        const txt = input.value.trim();
        if(!txt) return;

        // Post the message over the live internet link
        fetch("https://ntfy.sh" + room, {
            method: "POST",
            body: JSON.stringify({ id: myId, msg: txt })
        });

        saveText('me', txt);
        input.value = "";
    }

    function saveText(style, txt) {
        history.push({ style: style, txt: txt });
        localStorage.setItem('phoneChatSave', JSON.stringify(history));
        showText(style, txt);
    }

    function showText(style, txt) {
        const display = document.getElementById('msgDisplay');
        const d = document.createElement('div');
        d.className = `msg ${style}`;
        d.innerText = txt;
        display.appendChild(d);
        display.scrollTop = display.scrollHeight;
    }

    document.getElementById('textInput').onkeypress = function(e){
        if(e.key === 'Enter') sendMsg();
    };
</script>

</body>
</html>
